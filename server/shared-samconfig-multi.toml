version = 0.1

# 生产环境配置
[prod]
[prod.deploy]
[prod.deploy.parameters]
stack_name = "saas-control-stack-prod"
resolve_s3 = true
s3_prefix = "saas-control-prod"
region = "us-east-1"
confirm_changeset = false
capabilities = "CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
parameter_overrides = "Environment=prod"

# 开发环境配置
[dev]
[dev.deploy]
[dev.deploy.parameters]
stack_name = "saas-control-stack-dev"
resolve_s3 = true
s3_prefix = "saas-control-dev"
region = "us-east-1"
confirm_changeset = false
capabilities = "CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
parameter_overrides = "Environment=dev"

# 测试环境配置
[stage]
[stage.deploy]
[stage.deploy.parameters]
stack_name = "saas-control-stack-stage"
resolve_s3 = true
s3_prefix = "saas-control-stage"
region = "us-east-1"
confirm_changeset = false
capabilities = "CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
parameter_overrides = "Environment=stage"

# 默认配置（生产环境）
[default]
[default.deploy]
[default.deploy.parameters]
stack_name = "saas-control-stack-prod"
resolve_s3 = true
s3_prefix = "saas-control-prod"
region = "us-east-1"
confirm_changeset = false
capabilities = "CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
parameter_overrides = "Environment=prod" 