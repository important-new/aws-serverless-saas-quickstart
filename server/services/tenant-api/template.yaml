        components:
          securitySchemes:                    
            Authorizer:
              type: "apiKey"
              name: "Authorization"
              in: "header"
              x-amazon-apigateway-authtype: "custom"
              x-amazon-apigateway-authorizer:
                authorizerUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BusinessServicesAuthorizerFunction.Arn}/invocations
                authorizerResultTtlInSeconds: 30
                type: "token"
      StageName: !Ref StageName

  # Lambda Permissions for API Gateway (matching original tenant-template.yaml names)
  GetProductsLambdaApiGatewayExecutionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref GetProductsFunctionArn
      Principal: apigateway.amazonaws.com
      SourceArn: !Join [
        "", [
          "arn:aws:execute-api:", 
          {"Ref": "AWS::Region"}, ":", 
          {"Ref": "AWS::AccountId"}, ":", 
          !Ref ApiGatewayTenantApi, "/*/*/*"
          ]
        ] 
      
  GetProductLambdaApiGatewayExecutionPermission:
    Type: AWS::Lambda::Permission
