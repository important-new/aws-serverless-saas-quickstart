AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Tenant API Gateway Module for Serverless SaaS

Globals:
  Function:
    Timeout: 29
    Runtime: python3.13
    Layers:
      - !Sub "arn:aws:lambda:${AWS::Region}:580247275435:layer:LambdaInsightsExtension:14"
    Environment:
        Variables:
          LOG_LEVEL: DEBUG         
          POWERTOOLS_METRICS_NAMESPACE: "ServerlessSaaS"
          
Parameters:
  TenantIdParameter:
    Type: String
    Default: pooled
    Description: Tenant ID for the stack
  StageName:
    Type: String
    Default: "prod"
    Description: "Stage Name for the api"
  ProductServiceStackName:
    Type: String
    Default: "product-service"
    Description: "Product service stack name for importing function ARNs"
  OrderServiceStackName:
    Type: String
    Default: "order-service"
    Description: "Order service stack name for importing function ARNs"
  # Product Service Function ARNs
  GetProductFunctionArn:
    Type: String
    Description: "ARN of GetProduct function"
  GetProductsFunctionArn:
    Type: String
    Description: "ARN of GetProducts function"
  CreateProductFunctionArn:
    Type: String
    Description: "ARN of CreateProduct function"
  UpdateProductFunctionArn:
    Type: String
    Description: "ARN of UpdateProduct function"
  DeleteProductFunctionArn:
    Type: String
    Description: "ARN of DeleteProduct function"
  # Order Service Function ARNs
  GetOrderFunctionArn:
    Type: String
    Description: "ARN of GetOrder function"
  GetOrdersFunctionArn:
    Type: String
    Description: "ARN of GetOrders function"
  CreateOrderFunctionArn:
    Type: String
    Description: "ARN of CreateOrder function"
  UpdateOrderFunctionArn:
    Type: String
    Description: "ARN of UpdateOrder function"
  DeleteOrderFunctionArn:
    Type: String
    Description: "ARN of DeleteOrder function"

Conditions:
  IsPooledDeploy: !Equals [ !Ref TenantIdParameter, pooled]

Resources: 
  ServerlessSaaSLayers:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Join ['-', [serverless-saas-dependencies-api, !Ref TenantIdParameter]]
      Description: Utilities for tenant API
      ContentUri: ../../shared/layers/
      CompatibleRuntimes:
        - python3.13          
      LicenseInfo: 'MIT'
      RetentionPolicy: Retain      
    Metadata:
      BuildMethod: python3.13   
        
  BusinessServicesAuthorizerFunction:
    Type: AWS::Serverless::Function 
    Properties:
      CodeUri: ./
      Handler: tenant_authorizer.lambda_handler
      Role: !ImportValue Serverless-SaaS-AuthorizerExecutionRoleArn
      MemorySize: 256
      Tracing: Active
      Layers: 
        - !Ref ServerlessSaaSLayers
      Environment:
        Variables:
          OPERATION_USERS_USER_POOL: !ImportValue Serverless-SaaS-CognitoOperationUsersUserPoolId
          OPERATION_USERS_APP_CLIENT: !ImportValue Serverless-SaaS-CognitoOperationUsersUserPoolClientId
          OPERATION_USERS_API_KEY : !ImportValue Serverless-SaaS-ApiKeyOperationUsers
          
  ApiGatewayAccessLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join ['-', [/aws/api-gateway/access-logs-serverless-saas-tenant-api-, !Ref TenantIdParameter]]
      RetentionInDays: 30
      
  ThrottlingLimitMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: 
        Ref: "ApiGatewayAccessLogs"
      FilterPattern: '{$.status = "429"}'
      MetricTransformations:
        - 
          MetricValue: "1"
          MetricNamespace: "Serverless-SaaS-Reference-Architecture"
          MetricName: !Join ['-', ["ThrottlingLimitExceeded", !Ref TenantIdParameter]]
          
  ThrottlingLimitExceeded:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Throttling limit exceeded errors
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: !Join ['-', ["ThrottlingLimitExceeded", !Ref TenantIdParameter]]
      Namespace: "Serverless-SaaS-Reference-Architecture"
      Period: 60
      Statistic: SampleCount
      Threshold: 0 
      
  ApiGatewayTenantApi:
    Type: AWS::Serverless::Api
    Properties:
      MethodSettings:
        - DataTraceEnabled: False
          LoggingLevel: INFO
          MetricsEnabled: True
          ResourcePath: '/*' 
          HttpMethod: '*' 
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayAccessLogs.Arn
        Format: '{ "requestId":"$context.requestId", "ip": "$context.identity.sourceIp", "caller":"$context.identity.caller", "user":"$context.identity.user","requestTime":"$context.requestTime", "httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath", "status":"$context.status","protocol":"$context.protocol", "responseLength":"$context.responseLength" }'
      TracingEnabled: True
      DefinitionBody:
        openapi: 3.0.1
        info:
          title: !Join ['-', [!Ref TenantIdParameter, 'serverless-saas-tenant-api']]
        basePath: !Join ['', ['/', !Ref StageName]]
        x-amazon-apigateway-api-key-source : "AUTHORIZER"
        schemes:
          - https
        paths:
          /order/{id}:
            get:
              summary: Returns a order
              description: Return a order by a order id.
              produces:
                - application/json
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              responses: {}
              security:  
                - api_key: []      
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Sub 
                  - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
                  - FunctionArn: !Ref GetOrderFunctionArn
                httpMethod: POST
                type: aws_proxy 
            put:              
              produces:
                - application/json
              responses: {}
              security:   
                - api_key: []   
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Sub 
                  - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
                  - FunctionArn: !Ref UpdateOrderFunctionArn
                httpMethod: POST
                type: aws_proxy     
            delete:
              summary: Deletes a order
              description: Deletes a order by a order id.
              produces:
                - application/json
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              responses: {}
              security:      
                - api_key: [] 
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Sub 
                  - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
                  - FunctionArn: !Ref DeleteOrderFunctionArn
                httpMethod: POST
                type: aws_proxy
            options:
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: 200 response
                  schema:
                    $ref: "#/definitions/Empty"
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Headers:
                      type: string
              x-amazon-apigateway-integration:
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
                      method.response.header.Access-Control-Allow-Origin:  "'*'"
                passthroughBehavior: when_no_match
                requestTemplates:
                  application/json: "{\"statusCode\": 200}"
                type: mock      
          /orders:
            get:
              summary: Returns all orders
              description: Returns all orders.
              produces:
                - application/json
              responses: {}
              security:   
                - api_key: []  
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Sub 
                  - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
                  - FunctionArn: !Ref GetOrdersFunctionArn
                httpMethod: POST
                type: aws_proxy
            options:
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: 200 response
                  schema:
                    $ref: "#/definitions/Empty"
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Headers:
                      type: string
              x-amazon-apigateway-integration:
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
                      method.response.header.Access-Control-Allow-Origin:  "'*'"
                passthroughBehavior: when_no_match
                requestTemplates:
                  application/json: "{\"statusCode\": 200}"
                type: mock                              
          /order:
            post:              
              produces:
                - application/json
              responses: {}
              security:    
                - api_key: []     
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Sub 
                  - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
                  - FunctionArn: !Ref CreateOrderFunctionArn
                httpMethod: POST
                type: aws_proxy
            options:
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: 200 response
                  schema:
                    $ref: "#/definitions/Empty"
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Headers:
                      type: string
              x-amazon-apigateway-integration:
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
                      method.response.header.Access-Control-Allow-Origin:  "'*'"
                passthroughBehavior: when_no_match
                requestTemplates:
