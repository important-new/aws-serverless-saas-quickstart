                type: mock     
          /product/{id}:
            get:
              summary: Returns a product
              description: Return a product by a product id.
              produces:
                - application/json
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              responses: {}
              security:  
                - api_key: []
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Sub 
                  - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
                  - FunctionArn: !Ref GetProductFunctionArn
                httpMethod: POST
                type: aws_proxy 
            put:              
              produces:
                - application/json
              responses: {}
              security: 
                - api_key: []
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Sub 
                  - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
                  - FunctionArn: !Ref UpdateProductFunctionArn
                httpMethod: POST
                type: aws_proxy     
            delete:
              summary: Deletes a product
              description: Deletes a product by a product id.
              produces:
                - application/json
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              responses: {}
              security:     
                - api_key: []
                - Authorizer: []
              x-amazon-apigateway-integration:
                uri: !Sub 
                  - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
                  - FunctionArn: !Ref DeleteProductFunctionArn
                httpMethod: POST
                type: aws_proxy 
            options:
              consumes:
