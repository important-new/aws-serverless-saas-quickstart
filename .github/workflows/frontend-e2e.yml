name: frontend-e2e

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "e2e/**"
      - ".github/workflows/frontend-e2e.yml"
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Build the three apps
        run: |
          for app in Landing Application Admin; do
            (cd "client/$app" && npm install --legacy-peer-deps --no-audit --no-fund && npx ng build --configuration production)
          done
      - name: Install Playwright + browser
        run: cd e2e && npm install --no-audit --no-fund && npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: cd e2e && npx playwright test
